<!DOCTYPE html>
<html>
<body style="background:#10141a;color:white;padding:40px;font-family:sans-serif">
<h3>Test file input on Vercel domain</h3>

<p>Test 1: Standard file input</p>
<input type="file" />

<p>Test 2: Label + hidden input</p>
<label for="t2" style="background:#262a31;padding:10px;cursor:pointer;display:inline-block;border-radius:8px">
  📎 Attach file
</label>
<input id="t2" type="file" style="display:none"/>

<p>Test 3: Button onclick</p>
<button onclick="document.getElementById('t3').click()" style="background:#262a31;color:white;padding:10px;cursor:pointer;border:none;border-radius:8px">
  📎 Attach file (button)
</button>
<input id="t3" type="file" style="display:none"/>

<script>
document.querySelectorAll('input[type=file]').forEach(el => {
  el.addEventListener('change', e => {
    document.getElementById('result').textContent = 'Selected: ' + e.target.files[0]?.name;
  });
});
</script>
<p id="result" style="color:#e9c176;margin-top:20px"></p>
</body>
</html>
